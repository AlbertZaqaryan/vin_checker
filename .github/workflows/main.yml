name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v3

    # ---------- AWS LOGIN ----------
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.IAM_ACCESS_KEY }}
        aws-secret-access-key: ${{ secrets.IAM_SECRET_KEY }}
        aws-region: ${{ secrets.S3_REGION }}

    # ---------- DOWNLOAD .ENV ----------
    - name: Download .env from S3
      run: |
        aws s3 cp s3://${{ secrets.S3_NAME }}/${{ secrets.S3_ENV_FILE }} .env

    # ---------- BUILD DOCKER IMAGE ----------
    - name: Build Docker image
      run: docker build -t vin_checker .

    - name: Save Docker image
      run: docker save vin_checker > vin_checker.tar

    # ---------- COPY TO EC2 ----------
    - name: Copy files to EC2
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        source: "vin_checker.tar,.env"
        target: "~/app"

    # ---------- DEPLOY ON EC2 ----------
    - name: Deploy on EC2
      uses: appleboy/ssh-action@v0.1.8
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          cd ~/app
          docker stop vin_bot || true
          docker rm vin_bot || true
          docker load < vin_checker.tar
          docker run -d --name vin_bot --env-file .env vin_checker
